services:
  - type: web
    name: med-student-tracker
    runtime: python
    plan: starter
    buildCommand: ./build.sh
    startCommand: ./start.sh
    healthCheckPath: /health/ready/
    autoDeploy: false
    envVars:
      - key: DJANGO_ENV
        value: prod
      - key: DJANGO_DEBUG
        value: false
      - key: DJANGO_USE_SQLITE
        value: false
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DATABASE_URL
        fromDatabase:
          name: med-student-tracker-db
          property: connectionString
      - key: DJANGO_MEDIA_ROOT
        value: /var/lib/med-student-tracker/media
      - key: DJANGO_PROTECTED_EXPORT_ROOT
        value: /var/lib/med-student-tracker/protected_exports
      - key: BACKUP_FULL_ROOT
        value: /var/lib/med-student-tracker/backups/full
      - key: BACKUP_DAILY_SQL_ROOT
        value: /var/lib/med-student-tracker/backups/daily_sql
      - key: DJANGO_EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: DJANGO_DEFAULT_FROM_EMAIL
        sync: false
      - key: DJANGO_EMAIL_HOST
        sync: false
      - key: DJANGO_EMAIL_PORT
        sync: false
      - key: DJANGO_EMAIL_HOST_USER
        sync: false
      - key: DJANGO_EMAIL_HOST_PASSWORD
        sync: false
      - key: DJANGO_EMAIL_USE_TLS
        sync: false
    disk:
      name: med-student-tracker-data
      mountPath: /var/lib/med-student-tracker
      sizeGB: 5

databases:
  - name: med-student-tracker-db
    plan: starter
    databaseName: medtracker
    user: medtracker
