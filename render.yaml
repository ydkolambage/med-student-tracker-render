services:
  - type: web
    name: med-student-tracker-free-test
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: ./start.sh
    healthCheckPath: /health/ready/
    autoDeploy: false
    envVars:
      - key: DJANGO_ENV
        value: prod
      - key: DJANGO_DEBUG
        value: false
      - key: DJANGO_USE_SQLITE
        value: false
      - key: DJANGO_RENDER_FREE_TEST
        value: true
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DATABASE_URL
        fromDatabase:
          name: med-student-tracker-free-test-db
          property: connectionString
      - key: DJANGO_MEDIA_ROOT
        value: /tmp/med-student-tracker/media
      - key: DJANGO_PROTECTED_EXPORT_ROOT
        value: /tmp/med-student-tracker/protected_exports
      - key: BACKUP_FULL_ROOT
        value: /tmp/med-student-tracker/backups/full
      - key: BACKUP_DAILY_SQL_ROOT
        value: /tmp/med-student-tracker/backups/daily_sql
      - key: DJANGO_EMAIL_BACKEND
        value: django.core.mail.backends.console.EmailBackend

databases:
  - name: med-student-tracker-free-test-db
    plan: free
    databaseName: medtracker
    user: medtracker
