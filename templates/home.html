<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Medical Student Tracker</title>
    <style>
        :root {
            color-scheme: light;
            --ink: #17324f;
            --muted: #55708f;
            --line: #d8e1ee;
            --panel: rgba(255,255,255,0.94);
            --accent: #005f73;
            --bg-top: #f8fbff;
            --bg-bottom: #eef5ef;
            font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background:
                radial-gradient(circle at top left, rgba(0, 95, 115, 0.10), transparent 30%),
                radial-gradient(circle at right 20%, rgba(238, 155, 0, 0.10), transparent 24%),
                linear-gradient(180deg, var(--bg-top), var(--bg-bottom));
            color: var(--ink);
            min-height: 100vh;
        }
        main {
            max-width: 82rem;
            margin: 0 auto;
            padding: 3rem 1.5rem;
        }
        .hero {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 2rem;
            padding: clamp(2rem, 4vw, 3rem);
            box-shadow: 0 18px 48px rgba(16, 35, 61, 0.08);
        }
        h1 {
            margin: 0;
            font-size: clamp(3rem, 7vw, 5rem);
            line-height: 0.95;
            letter-spacing: -0.03em;
        }
        h2 {
            margin: 1.25rem 0 0;
            font-size: clamp(1.15rem, 2vw, 1.5rem);
            color: var(--muted);
            font-weight: 500;
        }
        p {
            margin: 1.5rem 0 0;
            font-size: 1.1rem;
            line-height: 1.7;
            max-width: 58rem;
            color: var(--muted);
        }
        .actions {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 2rem;
        }
        .button, button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.9rem 1.25rem;
            border-radius: 999px;
            border: 1px solid var(--line);
            background: white;
            color: var(--ink);
            font: inherit;
            text-decoration: none;
            cursor: pointer;
        }
        .button-primary {
            background: var(--accent);
            color: white;
            border-color: var(--accent);
        }
        .messages {
            display: grid;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }
        .message {
            padding: 0.9rem 1rem;
            border-radius: 1rem;
            border: 1px solid var(--line);
            background: white;
        }
        .message.success {
            border-color: #bde1c5;
            background: #eff9f1;
        }
        .message.error {
            border-color: #f3b6b1;
            background: #fff0ee;
        }
        form { margin: 0; }
        @media (max-width: 720px) {
            main { padding: 1.5rem 1rem; }
            .hero { border-radius: 1.5rem; }
            .actions { flex-direction: column; align-items: stretch; }
            .button, button { width: 100%; }
        }
    </style>
</head>
<body>
    <main>
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
        <section class="hero">
            <h1>Medical Student Tracker</h1>
            <h2>Secure access to student academic performance records</h2>
            <p>Review student progress across batches, streams, subjects, and examinations from one internal platform.</p>
            <div class="actions">
                <a class="button button-primary" href="{% url 'login' %}">Log in</a>
                <form method="post">
                    {% csrf_token %}
                    <input type="hidden" name="action" value="request_access">
                    <button type="submit">Request access</button>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
